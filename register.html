    <div id="main">
        <h1 id="welcomeHeader">Register for Gandalf's AeroSpectra Emporium</h1>

        <div id="section_do_space_this_fix">
            <form id="registerForm">

                <!-- Username Input -->
                <div class="section">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required />
                </div>

                <!-- Email Input -->
                <div class="section">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required />
                </div>

                <!-- Password Input -->
                <div class="section">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required />
                </div>

                <!-- Confirm Password Input -->
                <div class="section">
                    <label for="confirmPassword">Confirm Password:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required />
                </div>

                <!-- Product Selection Dropdown -->
                <div class="section">
                    <label for="productSerial">Product Serial Number:</label>
                    <input type="text" id="productSerial" name="productSerial" required
                        placeholder="Enter your product serial number" />
                </div>

                <!-- Submit Button -->
                <div class="section" id="buttonToSend">
                    <input type="submit" value="Register" />
                </div>
            </form>
        </div>
        <p>Already have an account? <a href="login.html">Login here</a></p>
